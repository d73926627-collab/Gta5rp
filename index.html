<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Удостоверение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0a14;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: #12121e;
            border-radius: 28px;
            padding: 22px 18px;
            margin-bottom: 16px;
            border: 1px solid #24243a;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: #fbbf24;
            margin-bottom: 16px;
        }

        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 11px;
            color: #6b7a93;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #2a2a44;
            background: #0d0d18;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .field input:focus {
            border-color: #fbbf24;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0b12;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 6px;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* ===== УДОСТОВЕРЕНИЕ ===== */
        .id-card {
            background: #f5f0e8;
            border-radius: 16px;
            padding: 20px 16px;
            border: 3px solid #b8860b;
            display: none;
            color: #1a1a2e;
        }
        .id-card.active {
            display: block;
        }

        .id-card .top {
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 2px solid #b8860b;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .id-card .photo {
            width: 80px;
            height: 100px;
            background: #d0c8b8;
            border-radius: 8px;
            border: 2px solid #b8860b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #4a3a2a;
            flex-shrink: 0;
            overflow: hidden;
        }
        .id-card .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .id-card .right {
            flex: 1;
            text-align: center;
            font-size: 48px;
            line-height: 1;
            color: #b8860b;
        }

        .id-card .data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            margin-top: 4px;
        }
        .id-card .data .item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px dashed #d0c8b8;
        }
        .id-card .data .item .label {
            color: #6a5a4a;
            font-weight: 600;
        }
        .id-card .data .item .value {
            font-weight: 700;
            color: #1a1a2e;
            text-align: right;
        }

        .id-card .bottom {
            margin-top: 12px;
            text-align: center;
            font-size: 11px;
            color: #4a3a2a;
            border-top: 1px solid #b8860b;
            padding-top: 10px;
        }
        .id-card .bottom .date {
            font-weight: 700;
            color: #b8860b;
        }

        .reset-btn {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #4a5a72;
            color: #8f9bb3;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .reset-btn:active {
            background: #1a1a2e;
        }

        .photo-upload {
            margin-bottom: 12px;
        }
        .photo-upload label {
            font-size: 12px;
            color: #8f9bb3;
        }
        .photo-upload input {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #2a2a44;
            background: #0d0d18;
            color: #fff;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title">🪪 Создать удостоверение</div>

        <div class="photo-upload">
            <label>📸 Фото</label>
            <input type="file" id="photoInput" accept="image/*">
        </div>

        <div class="field">
            <label>Имя</label>
            <input type="text" id="name" placeholder="Егор">
        </div>
        <div class="field">
            <label>Фамилия</label>
            <input type="text" id="surname" placeholder="Фамин">
        </div>
        <div class="field">
            <label>Звание</label>
            <input type="text" id="rank" placeholder="Капитан полиции">
        </div>
        <div class="field">
            <label>Подразделение</label>
            <input type="text" id="division" placeholder="Управление «К»">
        </div>
        <div class="field">
            <label>Организация</label>
            <input type="text" id="organization" placeholder="МВД РФ">
        </div>

        <button class="btn" id="generateBtn">Создать</button>
    </div>

    <!-- Удостоверение -->
    <div class="card id-card" id="idCard">
        <div class="top">
            <div class="photo" id="photoBox">👤</div>
            <div class="right">🛡️</div>
        </div>

        <div class="data">
            <div class="item"><span class="label">Имя</span><span class="value" id="outName">—</span></div>
            <div class="item"><span class="label">Фамилия</span><span class="value" id="outSurname">—</span></div>
            <div class="item" style="grid-column: 1 / -1;"><span class="label">Звание</span><span class="value" id="outRank">—</span></div>
            <div class="item" style="grid-column: 1 / -1;"><span class="label">Подразделение</span><span class="value" id="outDivision">—</span></div>
            <div class="item" style="grid-column: 1 / -1;"><span class="label">Организация</span><span class="value" id="outOrg">—</span></div>
        </div>

        <div class="bottom">
            🟡 Действительно до 01.01.2026 г.
            <div style="font-size:10px; color:#6a5a4a; margin-top:2px;">Подпись: _____________</div>
        </div>

        <button class="reset-btn" id="resetBtn">Создать новое</button>
    </div>

</div>

<script>
    const nameInput = document.getElementById('name');
    const surnameInput = document.getElementById('surname');
    const rankInput = document.getElementById('rank');
    const divisionInput = document.getElementById('division');
    const orgInput = document.getElementById('organization');
    const photoInput = document.getElementById('photoInput');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const idCard = document.getElementById('idCard');
    const photoBox = document.getElementById('photoBox');

    let uploadedPhoto = null;

    photoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedPhoto = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function generate() {
        const name = nameInput.value.trim() || 'Егор';
        const surname = surnameInput.value.trim() || 'Фамин';
        const rank = rankInput.value.trim() || 'Капитан полиции';
        const division = divisionInput.value.trim() || 'Управление «К»';
        const org = orgInput.value.trim() || 'МВД РФ';

        document.getElementById('outName').textContent = name;
        document.getElementById('outSurname').textContent = surname;
        document.getElementById('outRank').textContent = rank;
        document.getElementById('outDivision').textContent = division;
        document.getElementById('outOrg').textContent = org;

        if (uploadedPhoto) {
            photoBox.innerHTML = `<img src="${uploadedPhoto}" alt="фото">`;
        } else {
            photoBox.innerHTML = '👤';
        }

        idCard.classList.add('active');
    }

    function resetForm() {
        nameInput.value = '';
        surnameInput.value = '';
        rankInput.value = '';
        divisionInput.value = '';
        orgInput.value = '';
        photoInput.value = '';
        uploadedPhoto = null;
        photoBox.innerHTML = '👤';
        idCard.classList.remove('active');
    }

    generateBtn.addEventListener('click', generate);
    resetBtn.addEventListener('click', resetForm);
</script>
</body>
</html>
