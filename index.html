<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что-то</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .center {
            max-width: 400px;
            text-align: center;
            color: #e0e0e0;
        }
        .symbol {
            font-size: 72px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .text {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #bbbbdd;
            line-height: 1.6;
        }
        .sub {
            margin-top: 20px;
            font-size: 13px;
            color: #555577;
            letter-spacing: 1px;
        }
        .line {
            width: 40px;
            height: 2px;
            background: #3a3a5a;
            margin: 16px auto 0;
        }
    </style>
</head>
<body>
    <div class="center">
        <div class="symbol">⏻</div>
        <div class="text">
            Это просто страница.<br>
            Ничего не происходит.<br>
            Ничего не надо делать.
        </div>
        <div class="line"></div>
        <div class="sub">
            ты здесь — и этого достаточно
        </div>
    </div>
</body>
</html>
