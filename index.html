<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Генератор удостоверений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0a14;
            color: #e8edf5;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: #12121e;
            border-radius: 28px;
            padding: 22px 18px;
            margin-bottom: 16px;
            border: 1px solid #24243a;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
            color: #fbbf24;
        }

        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: #8f9bb3;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #2a2a44;
            background: #0d0d18;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .field input:focus {
            border-color: #fbbf24;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0b12;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.15);
            margin-top: 8px;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* Удостоверение */
        .id-card {
            background: #0d0d18;
            border-radius: 20px;
            padding: 20px 16px;
            border: 2px solid #fbbf24;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.04);
            display: none;
        }
        .id-card.active {
            display: block;
        }
        .id-card .photo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #1a1a30;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            border: 2px solid #fbbf24;
        }
        .id-card .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a2e;
            font-size: 14px;
        }
        .id-card .row .label {
            color: #6b7a93;
        }
        .id-card .row .value {
            font-weight: 600;
            color: #e0e8f0;
        }
        .id-card .org {
            text-align: center;
            margin-top: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #fbbf24;
            letter-spacing: 1px;
        }
        .id-card .footer-text {
            text-align: center;
            margin-top: 6px;
            font-size: 10px;
            color: #4a5a72;
        }

        .reset-btn {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #4a5a72;
            color: #8f9bb3;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .reset-btn:active {
            background: #1a1a2e;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title">🪪 Генератор удостоверений</div>

        <div class="field">
            <label>Имя</label>
            <input type="text" id="name" placeholder="Алексей">
        </div>
        <div class="field">
            <label>Фамилия</label>
            <input type="text" id="surname" placeholder="Иванов">
        </div>
        <div class="field">
            <label>Звание</label>
            <input type="text" id="rank" placeholder="Майор полиции">
        </div>
        <div class="field">
            <label>Подразделение</label>
            <input type="text" id="division" placeholder="Управление «К»">
        </div>
        <div class="field">
            <label>Организация</label>
            <input type="text" id="organization" placeholder="МВД РФ">
        </div>

        <button class="btn" id="generateBtn">Создать удостоверение</button>
    </div>

    <!-- Готовое удостоверение -->
    <div class="card id-card" id="idCard">
        <div class="photo">👤</div>
        <div class="row"><span class="label">Имя</span><span class="value" id="outName">—</span></div>
        <div class="row"><span class="label">Фамилия</span><span class="value" id="outSurname">—</span></div>
        <div class="row"><span class="label">Звание</span><span class="value" id="outRank">—</span></div>
        <div class="row"><span class="label">Подразделение</span><span class="value" id="outDivision">—</span></div>
        <div class="org" id="outOrg">—</div>
        <div class="footer-text">🪪 Удостоверение действительно</div>
        <button class="reset-btn" id="resetBtn">Создать новое</button>
    </div>

</div>

<script>
    const nameInput = document.getElementById('name');
    const surnameInput = document.getElementById('surname');
    const rankInput = document.getElementById('rank');
    const divisionInput = document.getElementById('division');
    const orgInput = document.getElementById('organization');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const idCard = document.getElementById('idCard');

    function generate() {
        const name = nameInput.value.trim() || 'Алексей';
        const surname = surnameInput.value.trim() || 'Иванов';
        const rank = rankInput.value.trim() || 'Майор полиции';
        const division = divisionInput.value.trim() || 'Управление «К»';
        const org = orgInput.value.trim() || 'МВД РФ';

        document.getElementById('outName').textContent = name;
        document.getElementById('outSurname').textContent = surname;
        document.getElementById('outRank').textContent = rank;
        document.getElementById('outDivision').textContent = division;
        document.getElementById('outOrg').textContent = org;

        idCard.classList.add('active');
    }

    function resetForm() {
        nameInput.value = '';
        surnameInput.value = '';
        rankInput.value = '';
        divisionInput.value = '';
        orgInput.value = '';
        idCard.classList.remove('active');
    }

    generateBtn.addEventListener('click', generate);
    resetBtn.addEventListener('click', resetForm);
</script>
</body>
</html>
