<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Удостоверение МВД</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #0a0a14;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: #12121e;
            border-radius: 28px;
            padding: 22px 18px;
            margin-bottom: 16px;
            border: 1px solid #24243a;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: #fbbf24;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 11px;
            color: #6b7a93;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #2a2a44;
            background: #0d0d18;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .field input:focus {
            border-color: #fbbf24;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0b12;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.15);
            margin-top: 6px;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* ===== УДОСТОВЕРЕНИЕ (как на фото) ===== */
        .id-card {
            background: #0b0b12;
            border-radius: 16px;
            padding: 24px 18px 18px;
            border: 3px solid #d4a017;
            box-shadow: 0 0 50px rgba(212, 160, 23, 0.06);
            display: none;
            color: #d4a017;
            font-family: 'Courier New', monospace;
            position: relative;
        }
        .id-card.active {
            display: block;
        }

        .id-card .header {
            text-align: center;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #d4a017;
            border-bottom: 2px solid #d4a017;
            padding-bottom: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .id-card .header .sub {
            font-size: 10px;
            font-weight: 400;
            color: #a08050;
            letter-spacing: 1px;
        }

        .id-card .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px dashed #2a2a3a;
        }
        .id-card .row:last-child {
            border-bottom: none;
        }
        .id-card .row .label {
            color: #a08050;
            font-weight: 600;
        }
        .id-card .row .value {
            font-weight: 700;
            color: #d4a017;
            text-align: right;
        }

        .id-card .stamp {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #a08050;
            border-top: 1px solid #2a2a3a;
            padding-top: 10px;
            letter-spacing: 1px;
        }
        .id-card .stamp .date {
            font-weight: 700;
            color: #d4a017;
        }

        .reset-btn {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #4a5a72;
            color: #8f9bb3;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .reset-btn:active {
            background: #1a1a2e;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title">🪪 Генератор удостоверений</div>

        <div class="field">
            <label>Имя</label>
            <input type="text" id="name" placeholder="Egor">
        </div>
        <div class="field">
            <label>Фамилия</label>
            <input type="text" id="surname" placeholder="Famin">
        </div>
        <div class="field">
            <label>Звание</label>
            <input type="text" id="rank" placeholder="Капитан полиции">
        </div>
        <div class="field">
            <label>Подразделение</label>
            <input type="text" id="division" placeholder="Управление полиции BLACK RUSSIA">
        </div>
        <div class="field">
            <label>Организация</label>
            <input type="text" id="organization" placeholder="МВД ЮЖНОГО (RP)">
        </div>

        <button class="btn" id="generateBtn">Создать удостоверение</button>
    </div>

    <!-- Удостоверение как на фото -->
    <div class="card id-card" id="idCard">
        <div class="header">
            🛡️ МВД ЮЖНОГО (RP)
            <div class="sub">BLACK RUSSIA</div>
        </div>

        <div class="row">
            <span class="label">Имя</span>
            <span class="value" id="outName">—</span>
        </div>
        <div class="row">
            <span class="label">Фамилия</span>
            <span class="value" id="outSurname">—</span>
        </div>
        <div class="row">
            <span class="label">Звание</span>
            <span class="value" id="outRank">—</span>
        </div>
        <div class="row">
            <span class="label">Подразделение</span>
            <span class="value" id="outDivision">—</span>
        </div>
        <div class="row">
            <span class="label">Организация</span>
            <span class="value" id="outOrg">—</span>
        </div>

        <div class="stamp">
            🟡 Личный № 616661 · RP-ID № 77777
            <div style="font-size:9px; color:#a08050; margin-top:4px;">Действительно до 01.01.2026 г.</div>
        </div>

        <button class="reset-btn" id="resetBtn">Создать новое</button>
    </div>

</div>

<script>
    const nameInput = document.getElementById('name');
    const surnameInput = document.getElementById('surname');
    const rankInput = document.getElementById('rank');
    const divisionInput = document.getElementById('division');
    const orgInput = document.getElementById('organization');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const idCard = document.getElementById('idCard');

    function generate() {
        const name = nameInput.value.trim() || 'Egor';
        const surname = surnameInput.value.trim() || 'Famin';
        const rank = rankInput.value.trim() || 'Капитан полиции';
        const division = divisionInput.value.trim() || 'Управление полиции BLACK RUSSIA';
        const org = orgInput.value.trim() || 'МВД ЮЖНОГО (RP)';

        document.getElementById('outName').textContent = name;
        document.getElementById('outSurname').textContent = surname;
        document.getElementById('outRank').textContent = rank;
        document.getElementById('outDivision').textContent = division;
        document.getElementById('outOrg').textContent = org;

        idCard.classList.add('active');
    }

    function resetForm() {
        nameInput.value = '';
        surnameInput.value = '';
        rankInput.value = '';
        divisionInput.value = '';
        orgInput.value = '';
        idCard.classList.remove('active');
    }

    generateBtn.addEventListener('click', generate);
    resetBtn.addEventListener('click', resetForm);
</script>
</body>
</html>
